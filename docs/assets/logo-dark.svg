<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 110" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="50%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#74c7ec" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#89b4fa" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#b4befe" stop-opacity="0"/>
    </radialGradient>
    <filter id="textglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <ellipse cx="260" cy="45" rx="220" ry="40" fill="url(#glow)"/>
  <text x="260" y="52" text-anchor="middle"
        font-family="'Inter', 'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="48" font-weight="800" fill="url(#grad)" letter-spacing="6"
        filter="url(#textglow)">MAINSAIL</text>
  <line x1="160" y1="68" x2="360" y2="68" stroke="url(#grad)" stroke-width="0.6" opacity="0.2"/>
  <text x="260" y="84" text-anchor="middle"
        font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="10" font-weight="400" fill="#7f849c" letter-spacing="5">UNIX UTILITIES, IN ONE BINARY</text>
  <text x="260" y="100" text-anchor="middle"
        font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
        font-size="7.5" font-weight="400" fill="#585b70" letter-spacing="3">PYTHON  ·  73 APPLETS  ·  LINUX  ·  MACOS  ·  WINDOWS</text>
</svg>
