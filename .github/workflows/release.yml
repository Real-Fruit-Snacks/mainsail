name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mainsail-linux-x64
            ext: ""
            # python-build-standalone is noticeably smaller than the
            # hosted Linux Python (stripped, statically linked).
            python_source: standalone
          - os: ubuntu-24.04-arm
            artifact: mainsail-linux-arm64
            ext: ""
            python_source: standalone
          - os: macos-latest
            artifact: mainsail-macos-arm64
            ext: ""
            # On macOS, the hosted Python is leaner than python-build-
            # standalone once Nuitka ingests it into an onefile payload.
            python_source: hosted
          - os: macos-13
            artifact: mainsail-macos-x64
            ext: ""
            python_source: hosted
          - os: windows-latest
            artifact: mainsail-windows-x64
            ext: ".exe"
            # Same story on Windows: hosted Python wins by ~1 MB.
            python_source: hosted
          - os: windows-11-arm
            artifact: mainsail-windows-arm64
            ext: ".exe"
            # actions/setup-python has no 3.10 arm64 build for Windows,
            # so fall back to python-build-standalone via uv.
            python_source: standalone
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up hosted Python 3.10
        if: matrix.python_source == 'hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Set up python-build-standalone 3.10
        if: matrix.python_source == 'standalone'
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"
          enable-cache: false
      - name: Install Nuitka
        run: python -m pip install "Nuitka[onefile]"
      - name: Build
        run: python build.py
      - name: Rename artifact
        shell: bash
        run: |
          mv "dist/mainsail${{ matrix.ext }}" "dist/${{ matrix.artifact }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

  # Host-agnostic: a single .pyz zipapp that runs on any Python 3.8+
  # system. Intended for ESXi, exotic architectures, and restrictive
  # environments where a native binary isn't viable.
  zipapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build zipapp
        run: python build.py --pyz
      - name: Smoke test
        run: |
          # GitHub Actions bash runs with set -eo pipefail. Avoid `cmd | head`
          # (SIGPIPE -> 141) and capture expected-nonzero rc with `|| rc=$?`.
          python3 dist/mainsail.pyz --version
          python3 dist/mainsail.pyz --list > list.out
          test "$(wc -l < list.out)" -ge 40
          out=$(python3 dist/mainsail.pyz echo "pyz ok")
          test "$out" = "pyz ok"
          grepout=$(printf 'foo\nbar\nbaz\n' | python3 dist/mainsail.pyz grep ba)
          test "$grepout" = "$(printf 'bar\nbaz')"
          rc=0
          python3 dist/mainsail.pyz false || rc=$?
          test "$rc" -eq 1
          python3 dist/mainsail.pyz true
      - uses: actions/upload-artifact@v4
        with:
          name: mainsail-pyz
          path: dist/mainsail.pyz

  release:
    needs: [build, zipapp]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
