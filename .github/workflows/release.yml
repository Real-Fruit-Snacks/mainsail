name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── full builds (all 51 applets) ─────────────────────
          - os: ubuntu-22.04
            artifact: mainsail-linux-x64
            ext: ""
            # Pinned to 22.04 (glibc 2.35) rather than ubuntu-latest
            # (24.04, glibc 2.39) so the binary runs on Ubuntu 22.04
            # LTS, Debian 12, RHEL 9 — anything with a reasonably
            # modern but not bleeding-edge glibc.
            # python-build-standalone is noticeably smaller than the
            # hosted Linux Python (stripped, statically linked).
            python_source: standalone
            preset: full
            source: mainsail
          - os: ubuntu-24.04-arm
            artifact: mainsail-linux-arm64
            ext: ""
            python_source: standalone
            preset: full
            source: mainsail
          - os: macos-latest
            artifact: mainsail-macos-arm64
            ext: ""
            # On macOS, the hosted Python is leaner than python-build-
            # standalone once Nuitka ingests it into an onefile payload.
            python_source: hosted
            preset: full
            source: mainsail
          # NB: macos-13 (Intel) was in the matrix briefly for v0.1.4-0.1.6
          # but GitHub's free-tier macos-13 queue is effectively unavailable
          # to this account (30+ min queue times, never dispatched).
          # Apple stopped shipping Intel Macs in 2023; the ARM64 binary
          # covers the supported lineup, and Intel-Mac users can use the
          # portable mainsail.pyz or build from source.
          - os: windows-latest
            artifact: mainsail-windows-x64
            ext: ".exe"
            # Same story on Windows: hosted Python wins by ~1 MB.
            python_source: hosted
            preset: full
            source: mainsail
          - os: windows-11-arm
            artifact: mainsail-windows-arm64
            ext: ".exe"
            # actions/setup-python has no 3.10 arm64 build for Windows,
            # so fall back to python-build-standalone via uv.
            python_source: standalone
            preset: full
            source: mainsail
          # ── slim builds (39 applets) ─────────────────────────
          # No archives (tar/gzip/gunzip/zip/unzip), no hashing
          # (md5sum/sha1sum/sha256sum/sha512sum), no disk stats
          # (du/df), no yes. Meaningful savings on the pyz; on the
          # Nuitka binary they're modest since the Python runtime
          # dominates the payload.
          - os: ubuntu-22.04
            artifact: mainsail-linux-x64-slim
            ext: ""
            python_source: standalone
            preset: slim
            source: mainsail-slim
          - os: ubuntu-24.04-arm
            artifact: mainsail-linux-arm64-slim
            ext: ""
            python_source: standalone
            preset: slim
            source: mainsail-slim
          - os: macos-latest
            artifact: mainsail-macos-arm64-slim
            ext: ""
            python_source: hosted
            preset: slim
            source: mainsail-slim
          - os: windows-latest
            artifact: mainsail-windows-x64-slim
            ext: ".exe"
            python_source: hosted
            preset: slim
            source: mainsail-slim
          - os: windows-11-arm
            artifact: mainsail-windows-arm64-slim
            ext: ".exe"
            python_source: standalone
            preset: slim
            source: mainsail-slim
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up hosted Python 3.10
        if: matrix.python_source == 'hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Set up python-build-standalone 3.10
        if: matrix.python_source == 'standalone'
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"
          enable-cache: false
      - name: Install Nuitka
        run: python -m pip install "Nuitka[onefile]"
      - name: Build
        run: python build.py --preset ${{ matrix.preset }}
      - name: Rename artifact
        shell: bash
        run: |
          mv "dist/${{ matrix.source }}${{ matrix.ext }}" "dist/${{ matrix.artifact }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

  # Host-agnostic: a .pyz zipapp that runs on any Python 3.8+ system.
  # Intended for ESXi, exotic architectures, and restrictive
  # environments where a native binary isn't viable. Full and slim
  # variants from the same runner.
  zipapp:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: full
            artifact: mainsail-pyz
            filename: mainsail.pyz
          - preset: slim
            artifact: mainsail-slim-pyz
            filename: mainsail-slim.pyz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build zipapp
        run: python build.py --pyz --preset ${{ matrix.preset }}
      - name: Smoke test
        run: |
          # GitHub Actions bash runs with set -eo pipefail. Avoid `cmd | head`
          # (SIGPIPE -> 141) and capture expected-nonzero rc with `|| rc=$?`.
          python3 dist/${{ matrix.filename }} --version
          python3 dist/${{ matrix.filename }} --list > list.out
          # full=51, slim=39 — both well over 15
          test "$(wc -l < list.out)" -ge 15
          out=$(python3 dist/${{ matrix.filename }} echo "pyz ok")
          test "$out" = "pyz ok"
          grepout=$(printf 'foo\nbar\nbaz\n' | python3 dist/${{ matrix.filename }} grep ba)
          test "$grepout" = "$(printf 'bar\nbaz')"
          rc=0
          python3 dist/${{ matrix.filename }} false || rc=$?
          test "$rc" -eq 1
          python3 dist/${{ matrix.filename }} true
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.filename }}

  # ── Optional musl-static Linux builds ────────────────────────────────
  # Built inside Alpine so the binary links against musl libc (not glibc).
  # If `--static-libpython=yes` succeeds we get a fully static ELF with
  # zero shared-library dependencies — runs on distroless containers,
  # exotic distros, anywhere you need maximum portability.
  #
  # `continue-on-error: true` so a static build hiccup doesn't block the
  # release; the dynamic glibc binaries from the `build` job above are
  # always shipped.
  # ── Linux x64 musl variant ──────────────────────────────────────────
  # Built inside Alpine 3.19 against musl libc instead of glibc. Runs on
  # Alpine, distroless containers with musl, and any musl-libc Linux
  # system. Will NOT run on glibc-only systems — use the dynamic glibc
  # binary above for those.
  #
  # Why not "fully static"?  CFLAGS=-static / LDFLAGS=-static *did* work
  # for the bootstrap shim, but Python rejects it at runtime with
  # "ImportError: Dynamic loading not supported" — a fully-static Python
  # interpreter can't dlopen() C extension modules. Producing a single
  # truly static Python binary requires baking every extension into
  # libpython at compile time, which python-build-standalone doesn't
  # ship and isn't worth the maintenance burden.
  #
  # ARM64 musl is intentionally absent: GitHub doesn't support Node.js
  # actions (e.g. actions/checkout) inside Alpine containers on Linux
  # ARM64 runners — only x64.
  build-musl:
    runs-on: ubuntu-22.04
    container:
      image: alpine:3.19
    continue-on-error: true
    steps:
      - name: Install build deps (Alpine)
        run: |
          # `file` is needed by Nuitka itself (it shells out to detect
          # binary file types). Without it the build aborts FATAL.
          apk add --no-cache \
            python3 python3-dev py3-pip \
            gcc g++ musl-dev \
            libffi-dev openssl-dev zlib-dev xz-dev bzip2-dev \
            patchelf ccache make git \
            bash file
      - uses: actions/checkout@v4
      - name: Install Nuitka
        run: pip3 install --break-system-packages "Nuitka[onefile]"
      - name: Build (musl, full preset)
        # Note: --static-libpython=yes still helps (bakes libpython into
        # the bootstrap; smaller payload). The bootstrap itself remains
        # dynamically linked against musl libc — that's fine, it's the
        # whole point of this variant.
        run: python3 build.py --static --preset full
      - name: Verify musl-only linkage
        shell: bash
        run: |
          deps=$(ldd dist/mainsail 2>&1 || true)
          echo "── ldd output ──"
          echo "$deps"
          echo "── verdict ──"
          # Allow exactly the musl libc / loader. Anything else (libssl,
          # libffi, libz, etc.) means we missed an --include-package
          # somewhere and the binary won't be portable.
          non_musl=$(echo "$deps" \
            | grep -E "=> /" \
            | grep -v "musl" || true)
          if [ -n "$non_musl" ]; then
            echo "FAIL: non-musl dynamic deps:"
            echo "$non_musl"
            exit 1
          fi
          echo "OK: only musl libc / loader."
      - name: Smoke test
        shell: bash
        run: |
          ./dist/mainsail --version
          ./dist/mainsail --list > list.out
          test "$(wc -l < list.out)" -ge 40
          out=$(./dist/mainsail echo "musl ok")
          test "$out" = "musl ok"
      - name: Rename
        shell: bash
        run: mv dist/mainsail dist/mainsail-linux-x64-musl
      - uses: actions/upload-artifact@v4
        with:
          name: mainsail-linux-x64-musl
          path: dist/mainsail-linux-x64-musl

  release:
    needs: [build, zipapp, build-musl]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
