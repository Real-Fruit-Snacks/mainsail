name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mainsail-linux-x64
            ext: ""
            # python-build-standalone is noticeably smaller than the
            # hosted Linux Python (stripped, statically linked).
            python_source: standalone
          - os: macos-latest
            artifact: mainsail-macos-arm64
            ext: ""
            # On macOS, the hosted Python is leaner than python-build-
            # standalone once Nuitka ingests it into an onefile payload.
            python_source: hosted
          - os: windows-latest
            artifact: mainsail-windows-x64
            ext: ".exe"
            # Same story on Windows: hosted Python wins by ~1 MB.
            python_source: hosted
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up hosted Python 3.10
        if: matrix.python_source == 'hosted'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Set up python-build-standalone 3.10
        if: matrix.python_source == 'standalone'
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"
          enable-cache: false
      - name: Install Nuitka
        run: python -m pip install "Nuitka[onefile]"
      - name: Build
        run: python build.py
      - name: Rename artifact
        shell: bash
        run: |
          mv "dist/mainsail${{ matrix.ext }}" "dist/${{ matrix.artifact }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
