name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mainsail-linux-x64
            ext: ""
          - os: macos-latest
            artifact: mainsail-macos-arm64
            ext: ""
          - os: windows-latest
            artifact: mainsail-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Astral python-build-standalone 3.10
        uses: astral-sh/setup-uv@v6
        with:
          # python-build-standalone is leaner than the hosted runner's
          # CPython (stripped, statically linked); combined with Nuitka
          # onefile this drops the Linux payload from ~50 MB to ~15 MB
          # uncompressed.
          python-version: "3.10"
          # No deps to cache — disable to avoid post-step failure
          # marking the whole job red when the cache dir is empty.
          enable-cache: false
      - name: Install Nuitka
        run: python -m pip install "Nuitka[onefile]"
      - name: Build
        run: python build.py
      - name: Rename artifact
        shell: bash
        run: |
          mv "dist/mainsail${{ matrix.ext }}" "dist/${{ matrix.artifact }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
